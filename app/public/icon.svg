<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BlogWriter">
  <defs>
    <linearGradient id="bw-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#242634"/>
      <stop offset="1" stop-color="#14141d"/>
    </linearGradient>
    <linearGradient id="bw-brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eccd80"/>
      <stop offset="1" stop-color="#bd882b"/>
    </linearGradient>
    <linearGradient id="bw-page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efe7d6"/>
      <stop offset="1" stop-color="#e3d9c4"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect width="512" height="512" rx="116" fill="url(#bw-tile)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>

  <!-- blog post card -->
  <g transform="rotate(-6 236 256)">
    <rect x="116" y="118" width="208" height="276" rx="24" fill="url(#bw-page)"/>
    <path d="M116 142 a24 24 0 0 1 24-24 h160 a24 24 0 0 1 24 24 v28 H116 Z" fill="#cf7350"/>
    <rect x="145" y="205" width="150" height="16" rx="8" fill="#33415a"/>
    <rect x="145" y="239" width="150" height="16" rx="8" fill="#7aa2f7"/>
    <rect x="145" y="273" width="118" height="16" rx="8" fill="#7d8b5f"/>
    <rect x="145" y="307" width="136" height="16" rx="8" fill="#c1b9a2"/>
  </g>

  <!-- fountain pen -->
  <g transform="rotate(-45 336 300)">
    <rect x="312" y="150" width="48" height="150" rx="22" fill="url(#bw-brass)"/>
    <rect x="312" y="150" width="16" height="150" rx="8" fill="#ffffff" opacity="0.18"/>
    <rect x="312" y="286" width="48" height="18" rx="6" fill="#7c5320"/>
    <path d="M312 304 H360 L336 372 Z" fill="#cf7350"/>
    <path d="M336 306 V354" stroke="#3a1e12" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <circle cx="336" cy="314" r="6" fill="#3a1e12" opacity="0.45"/>
  </g>

  <!-- AI sparkle (generation) -->
  <path transform="translate(392 126)" d="M0 -26 C5 -8 8 -5 26 0 C8 5 5 8 0 26 C-5 8 -8 5 -26 0 C-8 -5 -5 -8 0 -26 Z" fill="#8bb0ff"/>
  <circle cx="436" cy="182" r="7" fill="#9ece6a"/>
</svg>
